spring.application.name=alien-abduction-insurance

spring.datasource.url=jdbc:postgresql://db:5432/aliendb
spring.datasource.username=alienuser
spring.datasource.password=alienpass
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

jwt.secret=alien-abduction-super-secret-key-2024-very-long-string-for-security
jwt.expiration=86400000

server.port=8080

spring.cloud.openfeign.client.config.default.connect-timeout=5000
spring.cloud.openfeign.client.config.default.read-timeout=5000

nasa.api.key=DEMO_KEY
feign.nasa.url=https://api.nasa.gov
